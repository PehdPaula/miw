<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" type="image/png" href="/imagens/logo-miw.ico">
  <link rel="stylesheet" href="login.css">
</head>
<body>
    <a href="index.html" class="botao-voltar-topo">← Voltar</a>

  <div class="container">
    <!-- Logo no canto superior esquerdo -->
    <img src="imagens/logo-miw.JPG" alt="Logo" class="logo">
    <!-- Título Cadastro -->
    <div class="header">
      <h2>Login</h2>
    </div>
    <form action="#" method="POST">

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="text" id="email" name="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>

      <input type="submit" value="Login">
    </form>

    <div class="footer">
        <p>Ainda não tem uma conta? <a href="cadastro.html">Cadastrar</a></p>
        <p>Esqueceu sua senha? <a href="esqueci-senha.html">Recuperar senha</a></p>
    </div>
  </div>
</body>
</html>
